<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Non-Virtual Scrolling (Laggy Demo)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Override some container styles for full rendering */
        #scroll-container {
            height: calc(100vh - 180px);
            overflow-y: auto;
            position: relative;
        }

        #list-items-container {
            position: relative;
            /* height will be naturally set by children */
        }

        .list-item {
            position: static !important;
            /* Don't use absolute positioning for this test */
            margin-bottom: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body>
    <div id="app">
        <header>
            <h1>Standard Scrolling (10,000 Items)</h1>
            <p>Warning: This page will likely be laggy as it renders everything at once.</p>
            <a href="index.html" style="color: #6366f1; text-decoration: none; font-weight: 600;">← Back to Virtual Scrolling</a>
        </header>

        <main id="scroll-container">
            <div id="list-items-container">
                <!-- 10,000 items will be injected here -->
            </div>
        </main>

        <div id="stats">
            <span>Scroll Position: <span id="scroll-y">0</span>px</span>
            <span>Total DOM Elements: <span id="element-count">0</span></span>
        </div>
    </div>
    <script src="sucks.js"></script>
</body>

</html>
